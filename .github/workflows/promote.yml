name: Promote Staging to Production

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Read last staging version
        run: |
          TAG=$(cat last_version_staging.txt)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Login to ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region eu-north-1 \
            | docker login --username AWS --password-stdin \
              "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com"

      - name: Pull staging image and retag for production
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          docker pull \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-staging:${{ env.TAG }}"

          docker tag \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-staging:${{ env.TAG }}" \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:${{ env.TAG }}"

      - name: Push production image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker push \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:${{ env.TAG }}"

      - name: Copy version file to production EC2
        run: |
          echo "${{ env.TAG }}" > last_version_production.txt
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key

          scp -o StrictHostKeyChecking=no -i cicd_key last_version_production.txt \
            ec2-user@${{ secrets.EC2_PRODUCTION_HOST }}:/home/ec2-user/devops-deployment-automation/

      - name: SSH into production and deploy
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key

          ssh -o StrictHostKeyChecking=no -i cicd_key ec2-user@${{ secrets.EC2_PRODUCTION_HOST }} \
            "cd devops-deployment-automation && ./scripts/deploy.sh"
