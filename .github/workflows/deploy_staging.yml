name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Notify Slack: Staging deploy started
      - name: Slack - Staging Deploy Started
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [
              {
                \"color\": \"#439FE0\",
                \"text\": \"🚀 *Staging Deployment Started*\nRepository: devops-deployment-automation\nEnvironment: *STAGING*\"
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Build and push Docker image
        run: |
          VERSION=$(date +'%Y%m%d%H%M')
          echo $VERSION > last_version_staging.txt

          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com

          docker build -t myapp-staging:$VERSION ./app
          docker tag myapp-staging:$VERSION ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com/myapp-staging:$VERSION
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com/myapp-staging:$VERSION

      # ⭐ NEW: Commit updated version file back to GitHub
      - name: Commit updated version file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_version_staging.txt
          git commit -m "Update staging version to $(cat last_version_staging.txt)"
          git push

      - name: Copy version file to staging EC2
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key
          scp -o StrictHostKeyChecking=no -i cicd_key last_version_staging.txt ec2-user@${{ secrets.EC2_STAGING_HOST }}:/home/ec2-user/devops-deployment-automation/

      - name: Deploy on staging EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i cicd_key ec2-user@${{ secrets.EC2_STAGING_HOST }} "cd devops-deployment-automation/scripts && ./deploy.sh"

      # Notify Slack: Staging deploy success
      - name: Slack - Staging Deploy Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [
              {
                \"color\": \"good\",
                \"text\": \"✅ *Staging Deployment Successful*\nEnvironment: *STAGING*\"
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      # Notify Slack: Staging deploy failed
      - name: Slack - Staging Deploy Failed
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"attachments\": [
              {
                \"color\": \"danger\",
                \"text\": \"❌ *Staging Deployment Failed*\nEnvironment: *STAGING*\"
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
