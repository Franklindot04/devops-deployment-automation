name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Slack - Production Deploy Started
        run: |
          echo '{
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚀 *Production Deployment Started*\nRepository: devops-deployment-automation\nEnvironment: *PRODUCTION*"
                }
              }
            ]
          }' | curl -X POST -H "Content-type: application/json" --data @- ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Generate version tag
        run: echo "TAG=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -f app/Dockerfile -t myapp-production:${{ env.TAG }} app

      - name: Tag for ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker tag "myapp-production:${{ env.TAG }}" \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:${{ env.TAG }}"

      - name: Login to ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region eu-north-1 \
            | docker login --username AWS --password-stdin \
              "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com"

      - name: Push to ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker push \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:${{ env.TAG }}"

      - name: Update version files (Version History)
        run: |
          # Save previous version
          if [ -f last_version_production.txt ]; then
            cp last_version_production.txt previous_version_production.txt
          fi

          # Write new version
          echo "${{ env.TAG }}" > last_version_production.txt

      - name: Commit updated version files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add last_version_production.txt previous_version_production.txt

          git commit -m "chore: update production version files [skip ci]" || echo "No changes to commit"

          git push    

      - name: Copy version files to EC2
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key

          scp -o StrictHostKeyChecking=no -i cicd_key last_version_production.txt \
            ec2-user@${{ secrets.EC2_PRODUCTION_HOST }}:/home/ec2-user/devops-deployment-automation/

          scp -o StrictHostKeyChecking=no -i cicd_key previous_version_production.txt \
            ec2-user@${{ secrets.EC2_PRODUCTION_HOST }}:/home/ec2-user/devops-deployment-automation/

      - name: SSH into production and deploy
        id: deploy_step
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key

          ssh -o StrictHostKeyChecking=no -i cicd_key ec2-user@${{ secrets.EC2_PRODUCTION_HOST }} \
            "cd devops-deployment-automation && ./scripts/deploy_production.sh"

      - name: Slack - Production Deploy Successful
        if: success()
        run: |
          VERSION=${{ env.TAG }}

          echo "{
            \"blocks\": [
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"✅ *Production Deployment Successful*\\nEnvironment: *PRODUCTION*\\nVersion: \`$VERSION\`\"
                }
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"Rollback Production\" },
                    \"style\": \"danger\",
                    \"value\": \"rollback_production\",
                    \"action_id\": \"rollback_production\"
                  }
                ]
              }
            ]
          }" | curl -X POST -H "Content-type: application/json" --data @- ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack - Production Deploy Failed (Auto Rollback Triggered)
        if: failure()
        run: |
          echo '{
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *Production Deployment Failed*\nHealth check failed. Auto-rollback was triggered on EC2."
                }
              }
            ]
          }' | curl -X POST -H "Content-type: application/json" --data @- ${{ secrets.SLACK_WEBHOOK_URL }}
