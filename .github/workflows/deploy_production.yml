name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------------
      # SLACK: Production Deploy Started
      # -----------------------------
      - name: Slack - Production Deploy Started
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data @- ${{ secrets.SLACK_WEBHOOK_URL }} << 'EOF'
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚀 *Production Deployment Started*\nRepository: devops-deployment-automation\nEnvironment: *PRODUCTION*"
                }
              }
            ]
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Generate version tag
        run: echo "TAG=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -f app/Dockerfile -t myapp-production:${{ env.TAG }} app

      - name: Tag for ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker tag "myapp-production:${{ env.TAG }}" \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:${{ env.TAG }}"

      - name: Login to ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region eu-north-1 \
            | docker login --username AWS --password-stdin \
              "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com"

      - name: Push to ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker push \
            "$ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:${{ env.TAG }}"

      - name: Copy version file to EC2
        run: |
          echo "${{ env.TAG }}" > last_version_production.txt
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key

          scp -o StrictHostKeyChecking=no -i cicd_key last_version_production.txt \
            ec2-user@${{ secrets.EC2_PRODUCTION_HOST }}:/home/ec2-user/devops-deployment-automation/scripts/

      - name: SSH into production and deploy
        id: deploy_step
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key

          ssh -o StrictHostKeyChecking=no -i cicd_key ec2-user@${{ secrets.EC2_PRODUCTION_HOST }} \
            "cd devops-deployment-automation && ./scripts/deploy_production.sh"

      # -----------------------------
      # SLACK: Production Deploy Successful
      # -----------------------------
      - name: Slack - Production Deploy Successful
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data @- ${{ secrets.SLACK_WEBHOOK_URL }} << EOF
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *Production Deployment Successful*\nEnvironment: *PRODUCTION*\nVersion: ${env.TAG}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "Rollback Production"
                    },
                    "style": "danger",
                    "value": "rollback_production",
                    "action_id": "rollback_production"
                  }
                ]
              }
            ]
          }
          EOF

      # -----------------------------
      # SLACK: Production Deploy Failed
      # -----------------------------
      - name: Slack - Production Deploy Failed
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data @- ${{ secrets.SLACK_WEBHOOK_URL }} << 'EOF'
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *Production Deployment Failed*\nEnvironment: *PRODUCTION*"
                }
              }
            ]
          }
          EOF
