name: Promote Staging to Production

on:
  workflow_dispatch:
  repository_dispatch:
    types: [promote_to_production]

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Slack - Promote Started
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data @- ${{ secrets.SLACK_WEBHOOK_URL }} << 'EOF'
          {
            "attachments": [
              {
                "color": "#439FE0",
                "text": "🚀 *Promote to Production Started*\nEnvironment: *PRODUCTION*"
              }
            ]
          }
          EOF

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Read staging version and update production version files
        id: version
        run: |
          VERSION=$(cat last_version_staging.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Save previous production version BEFORE overwriting
          if [ -f last_version_production.txt ]; then
            cp last_version_production.txt previous_version_production.txt
          fi

          # Write new production version
          echo $VERSION > last_version_production.txt

      - name: Retag and push production image
        run: |
          VERSION=${{ steps.version.outputs.version }}

          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com

          docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com/myapp-staging:$VERSION

          docker tag \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com/myapp-staging:$VERSION \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:$VERSION

          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-north-1.amazonaws.com/myapp-production:$VERSION

      - name: Copy version file to production EC2
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > cicd_key
          chmod 600 cicd_key
          scp -o StrictHostKeyChecking=no -i cicd_key last_version_production.txt \
            ec2-user@${{ secrets.EC2_PRODUCTION_HOST }}:/home/ec2-user/devops-deployment-automation/scripts/

      - name: Deploy on production EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i cicd_key ec2-user@${{ secrets.EC2_PRODUCTION_HOST }} \
            "cd devops-deployment-automation/scripts && ./deploy_production.sh"

      - name: Slack - Promote Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data @- ${{ secrets.SLACK_WEBHOOK_URL }} << 'EOF'
          {
            "attachments": [
              {
                "color": "good",
                "text": "✅ *Production Deployment Successful*\nEnvironment: *PRODUCTION*"
              }
            ]
          }
          EOF

      - name: Slack - Promote Failed / Rollback Triggered
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data @- ${{ secrets.SLACK_WEBHOOK_URL }} << 'EOF'
          {
            "attachments": [
              {
                "color": "danger",
                "text": "⚠️ *Production Deployment Failed*\n🔄 Rollback Triggered Automatically"
              }
            ]
          }
          EOF
